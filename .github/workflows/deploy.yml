name: Deploy to EC2 (Blue-Green)

on:
  push:
    branches:
      - master
  workflow_dispatch:

# BG-08: Concurrency control — cancels in-progress run when new push arrives
concurrency:
  group: ${{ github.repository }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: mythicc123/multi-container-service

jobs:
  deploy:
    name: Blue-Green Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker setup
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # BG-07: Build and push with IMMUTABLE SHA tag only
      # Tag: mythicc123/multi-container-service:sha-a1b2c3d4e5f6...
      # NO 'latest' tag — each deploy is tied to a specific commit
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # BG-06 + BG-08: Full deploy pipeline with EC2 lock
      # Runs entirely inline — no script upload needed
      - name: Run blue-green deployment
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            LOCKFILE="/tmp/blue-green-deploy.lock"
            LOCK_TIMEOUT=300
            LOCK_TTL=600
            export GITHUB_RUN_ID="${GITHUB_RUN_ID:-local}"
            export GITHUB_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "=== Starting deployment (run $GITHUB_RUN_ID) ==="

            # BG-08: Remove any leftover lock artifacts
            rm -rf "$LOCKFILE" 2>/dev/null || true

            # BG-08: Acquire lock using mkdir (atomic on all filesystems) + polling
            acquired=0
            deadline=$(($(date -u +%s) + LOCK_TIMEOUT))
            while [[ $(date -u +%s) -lt $deadline ]]; do
              if mkdir "$LOCKFILE" 2>/dev/null; then
                acquired=1
                break
              fi
              sleep 2
            done
            if [[ $acquired -eq 0 ]]; then
              echo "ERROR: Could not acquire lock within ${LOCK_TIMEOUT}s"
              exit 1
            fi

            MY_PID=$$
            MY_HOSTNAME=$(hostname -f 2>/dev/null || hostname)
            now=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            ttl_at=$(date -u -d "+${LOCK_TTL} seconds" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u +%Y-%m-%dT%H:%M:%SZ)
            printf '%s\n' \
              "LOCK_HELD=1" \
              "PID=${MY_PID}" \
              "HOSTNAME=${MY_HOSTNAME}" \
              "ACQUIRED_AT=${now}" \
              "GITHUB_RUN_ID=${GITHUB_RUN_ID}" \
              "GITHUB_RUN_URL=${GITHUB_RUN_URL}" \
              "TTL_AT=${ttl_at}" \
              > "$LOCKFILE/data"
            echo "LOCK ACQUIRED: PID=${MY_PID} TTL_AT=${ttl_at}"

            # BG-06: Determine active slot and deploy inline
            IMAGE_TAG=sha-${{ github.sha }}
            ACTIVE_SLOT=$(cat /var/run/blue-green-state 2>/dev/null || echo blue)
            if [[ "$ACTIVE_SLOT" == "blue" ]]; then
              INACTIVE_SLOT=green
              INACTIVE_PORT=3002
            else
              INACTIVE_SLOT=blue
              INACTIVE_PORT=3001
            fi
            echo "Active slot: $ACTIVE_SLOT"
            echo "Deploying to inactive slot: $INACTIVE_SLOT (port $INACTIVE_PORT)"

            # BG-06: Pull and start the new version
            echo "[Deploy] Pulling $IMAGE_TAG to $INACTIVE_SLOT..."
            cd /opt/"$INACTIVE_SLOT"
            DOCKER_IMAGE=$(grep DOCKER_IMAGE .env | cut -d= -f2)
            # Override the image tag in .env
            sed -i "s|DOCKER_IMAGE=.*|DOCKER_IMAGE=mythicc123/multi-container-service:${IMAGE_TAG}|" .env
            docker compose pull
            docker compose up -d
            echo "[Deploy] Deployed."

            # BG-06: Health check (poll until healthy or 60s timeout)
            echo "[Health] Checking $INACTIVE_SLOT health..."
            HEALTH_URL="http://localhost:${INACTIVE_PORT}/health"
            waited=0
            while [[ $waited -lt 60 ]]; do
              if curl -sf "$HEALTH_URL" | grep -q '"status":"ok"'; then
                echo "[Health] PASS after ${waited}s"
                break
              fi
              sleep 3
              waited=$((waited + 3))
            done
            if [[ $waited -ge 60 ]]; then
              echo "[Health] FAIL: timed out after 60s"
              DEPLOY_STATUS=1
            fi

            # BG-06: Switch Nginx
            if [[ $waited -lt 60 ]]; then
              echo "[Nginx] Switching to $INACTIVE_SLOT..."
              sudo ln -sf /etc/nginx/sites-available/blue-green-${INACTIVE_SLOT}.conf /etc/nginx/sites-enabled/blue-green
              sudo nginx -t
              sudo nginx -s reload
              echo "$INACTIVE_SLOT" | sudo tee /var/run/blue-green-state > /dev/null
              echo "[Nginx] Switched to $INACTIVE_SLOT"
            fi

            # BG-08: Release lock — only if deploy succeeded
            if [[ $? -eq 0 ]]; then
              rm -rf "$LOCKFILE"
              echo "LOCK RELEASED"
            else
              echo "WARNING: Deploy failed — lock NOT released (TTL will clean it)"
            fi
            exit ${DEPLOY_STATUS:-0}
          timeout: 15m

      # BG-09: Basic smoke test — verify API responds after Nginx switch
      - name: Smoke test API endpoints
        run: |
          sleep 5
          HOST_IP="${{ secrets.EC2_HOST }}"
          echo "Smoke testing API at http://${HOST_IP}"

          # GET /health
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${HOST_IP}/health)
          if [[ "$HTTP_CODE" != "200" ]]; then echo "FAIL: GET /health returned $HTTP_CODE"; exit 1; fi
          echo "PASS: GET /health"

          # GET /todos
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${HOST_IP}/todos)
          if [[ "$HTTP_CODE" != "200" ]]; then echo "FAIL: GET /todos returned $HTTP_CODE"; exit 1; fi
          echo "PASS: GET /todos"

          # POST /todos — create a todo
          RESPONSE=$(curl -s -X POST http://${HOST_IP}/todos \
            -H "Content-Type: application/json" \
            -d '{"text":"ci-smoke-$(date +%s)","done":false}')
          echo "POST /todos: $RESPONSE"

          # Extract todo id
          TODO_ID=$(echo "$RESPONSE" | grep -o '"_id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [[ -z "$TODO_ID" ]]; then
            echo "FAIL: Could not extract todo ID from POST response"
            exit 1
          fi

          # PUT /todos/:id — update
          PUT_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "http://${HOST_IP}/todos/${TODO_ID}" \
            -H "Content-Type: application/json" \
            -d '{"text":"ci-smoke-updated","done":true}')
          if [[ "$PUT_CODE" != "200" ]]; then echo "FAIL: PUT returned $PUT_CODE"; exit 1; fi
          echo "PASS: PUT /todos/${TODO_ID}"

          # DELETE /todos/:id — cleanup
          DEL_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            "http://${HOST_IP}/todos/${TODO_ID}")
          if [[ "$DEL_CODE" != "200" ]]; then echo "FAIL: DELETE returned $DEL_CODE"; exit 1; fi
          echo "PASS: DELETE /todos/${TODO_ID}"

          echo ""
          echo "SMOKE TEST: ALL PASSED"
        shell: bash
